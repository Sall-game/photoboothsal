<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Photobooth Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .preview-container { position: relative; overflow: hidden; border-radius: 24px; background: #000; }
        #videoFeed { transform: scaleX(-1); width: 100%; height: auto; }
        .photostrip-canvas { display: none; }
        .filter-mono { filter: grayscale(100%); }
        .filter-sepia { filter: sepia(100%); }
        .filter-warm { filter: saturate(1.2) sepia(0.2) brightness(1.1); }
        .filter-cool { filter: hue-rotate(180deg) brightness(1.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">STUDIO<span class="text-indigo-600">SNAP</span></h1>
            <p class="text-slate-500 mt-2">Abadikan momen estetikmu dalam satu strip.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="preview-container shadow-2xl border-8 border-white">
                    <video id="videoFeed" autoplay playsinline></video>
                    
                    <div id="countdown" class="absolute inset-0 flex items-center justify-center text-white text-9xl font-black hidden bg-black/20 backdrop-blur-sm">
                        5
                    </div>

                    <div id="shotCounter" class="absolute top-4 right-4 bg-indigo-600 text-white px-4 py-2 rounded-full font-bold shadow-lg hidden">
                        SHOT 1 / 4
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <button onclick="setFilter('none')" class="p-2 border rounded-xl hover:bg-slate-50 transition">Original</button>
                        <button onclick="setFilter('filter-mono')" class="p-2 border rounded-xl hover:bg-slate-50 transition grayscale">B&W</button>
                        <button onclick="setFilter('filter-sepia')" class="p-2 border rounded-xl hover:bg-slate-50 transition">Vintage</button>
                        <button onclick="setFilter('filter-warm')" class="p-2 border rounded-xl hover:bg-slate-50 transition text-orange-400">Warm</button>
                    </div>
                    
                    <div class="flex items-center gap-4 overflow-x-auto pb-2">
                        <span class="text-sm font-semibold text-slate-400 uppercase">Frame:</span>
                        <button onclick="setFrame('#ffffff')" class="w-8 h-8 rounded-full border shadow-inner bg-white shrink-0"></button>
                        <button onclick="setFrame('#1e293b')" class="w-8 h-8 rounded-full border bg-slate-800 shrink-0"></button>
                        <button onclick="setFrame('#f472b6')" class="w-8 h-8 rounded-full border bg-pink-400 shrink-0"></button>
                        <button onclick="setFrame('#6366f1')" class="w-8 h-8 rounded-full border bg-indigo-500 shrink-0"></button>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <button id="startBtn" onclick="startSession()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-6 rounded-3xl text-xl font-bold shadow-xl shadow-indigo-200 transition-all transform hover:-translate-y-1">
                    START SHOOTING
                </button>

                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 min-h-[400px] flex flex-col items-center">
                    <p class="text-slate-400 text-sm font-medium mb-4">PREVIEW HASIL</p>
                    <div id="resultPreview" class="w-48 bg-slate-50 rounded-lg overflow-hidden border-4 border-white shadow-lg flex items-center justify-center text-slate-300 italic text-center p-4">
                        Hasil photostrip akan muncul di sini
                    </div>
                    <button id="downloadBtn" onclick="downloadImage()" class="mt-6 w-full hidden bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-2xl font-bold transition">
                        Download PNG
                    </button>
                </div>
            </div>
        </div>
    </div>

    <canvas id="mainCanvas" class="hidden"></canvas>
    <canvas id="tempCanvas" class="hidden"></canvas>

    <script>
        const video = document.getElementById('videoFeed');
        const countdownEl = document.getElementById('countdown');
        const shotCounterEl = document.getElementById('shotCounter');
        const resultPreview = document.getElementById('resultPreview');
        const downloadBtn = document.getElementById('downloadBtn');
        
        let currentFilter = 'none';
        let currentFrameColor = '#ffffff';
        let capturedImages = [];

        // Akses Kamera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720 }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Mohon izinkan akses kamera untuk menggunakan photobooth.");
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            video.className = filter;
        }

        function setFrame(color) {
            currentFrameColor = color;
        }

        async function startSession() {
            capturedImages = [];
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').innerText = "SMILE! 📸";
            shotCounterEl.classList.remove('hidden');

            for (let i = 1; i <= 4; i++) {
                shotCounterEl.innerText = `SHOT ${i} / 4`;
                await runCountdown(3);
                capturePhoto();
                await new Promise(r => setTimeout(r, 1000));
            }

            generatePhotostrip();
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "START SHOOTING";
            shotCounterEl.classList.add('hidden');
        }

        function runCountdown(seconds) {
            return new Promise(resolve => {
                countdownEl.classList.remove('hidden');
                let count = seconds;
                countdownEl.innerText = count;
                
                const timer = setInterval(() => {
                    count--;
                    if (count <= 0) {
                        clearInterval(timer);
                        countdownEl.classList.add('hidden');
                        resolve();
                    }
                    countdownEl.innerText = count;
                }, 1000);
            });
        }

        function capturePhoto() {
            const tempCanvas = document.getElementById('tempCanvas');
            const context = tempCanvas.getContext('2d');
            
            // Set ukuran canvas sesuai aspek rasio video (4:3)
            tempCanvas.width = 600;
            tempCanvas.height = 450;

            // Mirror effect
            context.translate(tempCanvas.width, 0);
            context.scale(-1, 1);
            
            // Terapkan filter manual pada canvas
            if (currentFilter === 'filter-mono') context.filter = 'grayscale(100%)';
            if (currentFilter === 'filter-sepia') context.filter = 'sepia(100%)';
            if (currentFilter === 'filter-warm') context.filter = 'saturate(1.2) sepia(0.2) brightness(1.1)';
            
            context.drawImage(video, 0, 0, 600, 450);
            capturedImages.push(tempCanvas.toDataURL('image/png'));
            
            // Flash effect
            video.classList.add('brightness-200');
            setTimeout(() => video.classList.remove('brightness-200'), 100);
        }

        function generatePhotostrip() {
            const mainCanvas = document.getElementById('mainCanvas');
            const ctx = mainCanvas.getContext('2d');
            
            const padding = 40;
            const imgWidth = 500;
            const imgHeight = 375;
            const gap = 30;
            
            mainCanvas.width = imgWidth + (padding * 2);
            mainCanvas.height = (imgHeight * 4) + (gap * 3) + (padding * 2) + 100; // +100 untuk margin bawah/logo

            // Draw Frame
            ctx.fillStyle = currentFrameColor;
            ctx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);

            // Draw Images
            capturedImages.forEach((src, index) => {
                const img = new Image();
                img.onload = () => {
                    const yPos = padding + (index * (imgHeight + gap));
                    ctx.drawImage(img, padding, yPos, imgWidth, imgHeight);
                    
                    if (index === 3) {
                        // Tambahkan text watermark/tanggal
                        ctx.fillStyle = currentFrameColor === '#ffffff' ? '#6366f1' : '#ffffff';
                        ctx.font = 'bold 24px "Plus Jakarta Sans"';
                        ctx.textAlign = 'center';
                        ctx.fillText('STUDIO SNAP - ' + new Date().toLocaleDateString(), mainCanvas.width/2, mainCanvas.height - 50);
                        
                        // Tampilkan Preview
                        resultPreview.innerHTML = `<img src="${mainCanvas.toDataURL()}" class="w-full h-auto">`;
                        downloadBtn.classList.remove('hidden');
                    }
                };
                img.src = src;
            });
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'my-photostrip.png';
            link.href = document.getElementById('mainCanvas').toDataURL();
            link.click();
        }

        initCamera();
    </script>
</body>
</html>
